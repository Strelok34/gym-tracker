<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<meta name="theme-color" content="#f5f5f0">
<title>Gym Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f0;--card:#fff;--border:#e8e8e2;--text:#1a1a1a;--muted:#888;--faint:#bbb;
  --accent:#e08010;--abg:#fff8ee;--abd:#f0a020;--atx:#b06010;
  --green:#2d9e5f;--gbg:#f0faf4;--gbd:#b8e8cc;--gtx:#1a7a42;
  --bbg:#e8f0fe;--btx:#1a4da8;--bbd:#3a6fd8;
  --pbg:#f3e8ff;--ptx:#6b21a8;--pbd:#a855f7;
  --ssbg:#fff0f0;--sstx:#b91c1c;
  --red:#dc2626;--redbg:#fef2f2;--redbd:#fca5a5;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:env(safe-area-inset-top,0px) 0 0;overscroll-behavior:none}
#root{padding:14px 14px 84px;max-width:560px;margin:0 auto}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(245,245,240,.96);border-top:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));display:flex;justify-content:center;z-index:100}
.nb{flex:1;max-width:160px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 8px;border:none;background:transparent;cursor:pointer;font-family:inherit;border-radius:8px}
.ni{font-size:20px;line-height:1}.nl{font-size:11px;font-weight:600;color:var(--faint)}.nb.on .nl{color:var(--atx)}
/* UTILITIES */
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px}
.pg{background:#efefea;color:var(--muted)}.pG{background:var(--gbg);color:var(--gtx)}
.ptitle{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:14px;margin-top:6px}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.ghost-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text)}
.ghost-btn:active{background:#eee}
.primary-btn{background:var(--text);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff}
.primary-btn:active{opacity:.85}
.danger-btn{background:transparent;border:1px solid var(--redbd);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--red)}
.danger-btn:active{background:var(--redbg)}
.text-inp{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none}
.text-inp:focus{border-color:var(--abd)}
/* BANNER */
.bnr{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#1a1a1a;border-radius:12px;margin-bottom:12px;color:#fff}
.bnr p{flex:1;font-size:13px;line-height:1.5}.bnr strong{display:block;font-size:14px;margin-bottom:2px}
.bnr-x{background:transparent;border:none;color:#888;font-size:18px;cursor:pointer;padding:0 3px;flex-shrink:0;font-family:inherit}
/* EDIT MODE BANNER */
.edit-banner{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--abg);border:1px solid var(--abd);border-radius:10px;margin-bottom:12px}
.edit-banner span{font-size:13px;font-weight:600;color:var(--atx)}
.edit-done-btn{background:var(--accent);border:none;border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
/* WARM-UP */
.wu-toggle{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer}
.wu-toggle:active{background:#f8f8f4}
.wu-tl{display:flex;align-items:center;gap:9px}.wu-title{font-size:14px;font-weight:700}
.wu-list{margin-bottom:14px}
.wu-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer}
.wu-item:active{opacity:.8}.wu-item.done{background:var(--gbg);border-color:var(--gbd)}
.wu-cb{width:19px;height:19px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;font-weight:700}
.wu-item.done .wu-cb{background:var(--green);border-color:var(--green);color:#fff}
.wu-body{flex:1}.wu-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.wu-name{font-size:13px;font-weight:600}.wu-dose{font-size:12px;color:var(--muted);white-space:nowrap}
.wu-focus{font-size:11px;color:var(--faint);margin-top:1px}
.wu-item.done .wu-name,.wu-item.done .wu-dose,.wu-item.done .wu-focus{color:var(--gtx)}
/* TABS */
.tabs-row{display:flex;align-items:center;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:55px;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:#efefea;cursor:pointer;text-align:center;font-family:inherit;position:relative}
.tab.on{background:var(--abg);border-color:var(--abd)}.tab.on.rd{background:var(--pbg);border-color:var(--pbd)}
.tab-lbl{font-size:10px;color:var(--faint);display:block;margin-bottom:1px}
.tab.on .tab-lbl{color:var(--atx)}.tab.on.rd .tab-lbl{color:var(--ptx)}
.tab-name{font-size:12px;font-weight:700;color:#444}
.tab.on .tab-name{color:var(--atx)}.tab.on.rd .tab-name{color:var(--ptx)}
.tab-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.add-day-btn{flex-shrink:0;width:36px;height:52px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;font-size:22px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-day-btn:active{background:#eee}
/* DAY HEADER */
.day-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.day-hdr-left{flex:1}
.day-hdr h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.day-hdr p{font-size:13px;color:var(--muted);margin-top:3px}
.edit-toggle-btn{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;margin-top:2px}
.edit-toggle-btn.active{background:var(--abg);border-color:var(--abd);color:var(--atx);font-weight:600}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:10px;position:relative}
.card.editing{border-color:var(--abd)}
.card-del-btn{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;z-index:2}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-left{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700;line-height:1.3}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px}
.ex-meta-edit{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.sr-inp{width:52px;padding:4px 7px;font-size:13px;border:1px solid var(--abd);border-radius:6px;background:var(--abg);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;text-align:center}
.sr-lbl{font-size:11px;color:var(--muted)}
.sr-save{padding:4px 11px;border-radius:99px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.sr-cancel{padding:4px 11px;border-radius:99px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.edit-meta-btn{font-size:10px;color:var(--faint);background:transparent;border:none;cursor:pointer;font-family:inherit;padding:0 0 0 5px;vertical-align:middle;text-decoration:underline}
.ex-last{font-size:11px;color:var(--faint);margin-top:2px;font-style:italic}
.ex-last.pr{color:var(--atx);font-style:normal;font-weight:700}
.ex-muscles{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
.ex-muscles-icon{font-size:10px}
.ex-muscles-text{color:var(--muted)}
.ex-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rtag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--bbg);color:var(--btx)}
.sstag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--ssbg);color:var(--sstx);font-weight:700}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.card-btns{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.swap-btn,.demo-btn{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none;display:inline-block}
.swap-btn{color:var(--muted)}.swap-btn.open{background:var(--abg);border-color:var(--abd);color:var(--atx);font-weight:600}
.demo-btn{color:var(--btx);border-color:var(--bbd);background:var(--bbg);font-weight:600}
/* SWAP PANEL */
.swap-panel{margin-bottom:10px;padding:10px;background:#f8f8f4;border-radius:8px;border:1px solid var(--border)}
.swap-filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.swap-filter{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:inherit;color:var(--muted)}
.swap-filter.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:600}
.swap-cat-label{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 4px;display:flex;align-items:center;gap:6px}
.swap-cat-label::after{content:"";flex:1;height:1px;background:var(--border)}
.swap-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:5px;cursor:pointer;font-size:13px;color:var(--text);width:100%;text-align:left;font-family:inherit}
.swap-opt.chosen{border-color:var(--abd);background:var(--abg);color:var(--atx);font-weight:600}
.swap-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0}
.swap-opt.chosen .swap-dot{background:var(--accent);border-color:var(--accent)}
.orig-tag{font-size:10px;color:var(--faint);margin-left:3px}
.swap-divider{height:1px;background:var(--border);margin:10px 0}
.custom-ex-row{display:flex;gap:6px;align-items:center}
.custom-ex-inp{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none;font-family:inherit}
.custom-ex-inp:focus{border-color:var(--abd)}
.custom-ex-use{padding:7px 12px;border-radius:8px;background:var(--text);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
/* SETS */
.set-head{display:grid;grid-template-columns:24px 1fr 62px 28px;gap:6px;padding-bottom:5px;border-bottom:1px solid #eee;margin-bottom:4px}
.set-head span{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
.set-head span:first-child,.set-head span:last-child{text-align:center}
.set-row{display:grid;grid-template-columns:24px 1fr 62px 28px;gap:6px;align-items:center;padding:4px 0}
.set-num{font-size:12px;color:var(--faint);text-align:center}
.set-row.done .set-num,.set-row.done .set-reps{opacity:.4}
.w-inp{width:100%;padding:6px 7px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:#f8f8f4;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none}
.w-inp:focus{border-color:var(--abd);background:var(--abg)}
.set-row.done .w-inp{border-color:var(--abd);background:var(--abg)}
.set-reps{font-size:11px;color:var(--muted);text-align:center;line-height:1.3}
.set-chk{display:flex;justify-content:center}
.set-chk input{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
/* TIMER */
.timer-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid #eee}
.t-btn{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:#f0f0ea;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;min-width:60px;font-weight:500}
.t-btn.run{background:var(--abg);border-color:var(--abd);color:var(--atx);font-weight:700}
.t-btn.fin{background:var(--gbg);border-color:var(--gbd);color:var(--gtx);font-weight:700}
.t-hint{font-size:12px;color:var(--faint)}
.ex-note{font-size:12px;color:var(--muted);line-height:1.55;margin-top:9px;padding-top:9px;border-top:1px solid #eee;font-style:italic}
/* SPARKLINE */
.spark-wrap{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ea}
.spark-title{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:600}
/* ADD EXERCISE FORM */
.add-ex-card{background:var(--card);border:1.5px dashed var(--abd);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.add-ex-title{font-size:14px;font-weight:700;color:var(--atx);margin-bottom:12px}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.form-row-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.form-select:focus{border-color:var(--abd)}
.add-ex-btns{display:flex;gap:8px;margin-top:4px}
/* ADD DAY FORM */
.add-day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:14px}
.add-day-title{font-size:15px;font-weight:700;margin-bottom:12px}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.color-swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.color-swatch.chosen{border-color:var(--text)}
/* RESET BTN */
.reset-btn{display:block;width:100%;margin-top:6px;padding:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--faint);font-size:12px;cursor:pointer;font-family:inherit}
.reset-btn:active{background:#eee}
/* PROGRESS */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.cal-nav-btn:active{background:#eee}
.cal-month{font-size:17px;font-weight:700;letter-spacing:-.01em}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow{font-size:11px;color:var(--faint);text-align:center;font-weight:600;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-cell{min-height:46px;border-radius:8px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;padding:5px 2px;cursor:pointer}
.cal-cell:active{background:#eee}
.cal-cell.today{border-color:var(--abd);background:var(--abg)}
.cal-cell.selected{border-color:var(--accent);background:var(--abg)}
.cal-cell.has-data{background:var(--card);border-color:var(--border)}
.cal-cell.empty{cursor:default;border:none;background:transparent !important}
.cal-day-num{font-size:13px;font-weight:600;line-height:1}.cal-cell.today .cal-day-num{color:var(--atx)}
.cal-dots{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sel-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.sel-title{font-size:15px;font-weight:800;margin-bottom:2px}
.sel-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.sel-ex{padding:8px 0;border-bottom:1px solid #f0f0ea}.sel-ex:last-child{border-bottom:none}
.sel-ex-name{font-size:13px;font-weight:700;margin-bottom:4px}
.sel-sets{display:flex;gap:5px;flex-wrap:wrap}
.sel-chip{font-size:12px;padding:3px 9px;border-radius:99px;background:var(--abg);color:var(--atx);font-weight:500}
.sel-vs{font-size:11px;margin-top:4px;color:var(--muted)}
.sel-vs.up{color:var(--gtx);font-weight:700}.sel-vs.dn{color:#c0392b;font-weight:700}
.no-data{text-align:center;padding:28px 20px;color:var(--faint);font-size:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px}
.pr-table{width:100%;border-collapse:collapse}
.pr-table th{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600;text-align:left;padding:0 0 8px}
.pr-table th:last-child{text-align:right}
.pr-table td{font-size:13px;padding:7px 0;border-top:1px solid #f0f0ea;vertical-align:top}
.pr-table td:last-child{text-align:right;color:var(--atx);font-weight:700}
.pr-name{font-weight:600}.pr-date{font-size:11px;color:var(--faint);display:block;margin-top:1px}
.no-pr{text-align:center;padding:18px;color:var(--faint);font-size:13px}
/* PROFILE VIEW */
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.profile-card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.profile-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ea}
.profile-item:last-child{border-bottom:none}
.profile-item-name{font-size:14px;font-weight:600}
.profile-item-name.active{color:var(--atx)}
.profile-active-tag{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--abg);color:var(--atx);margin-left:8px}
.profile-btns{display:flex;gap:6px}
.profile-switch-btn{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--bbd);background:var(--bbg);color:var(--btx);cursor:pointer;font-family:inherit}
.profile-del-btn{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--redbd);background:transparent;color:var(--red);cursor:pointer;font-family:inherit}
.new-profile-form{padding:10px 0 2px}
.new-profile-row{display:flex;gap:8px;margin-top:8px}
.export-import-row{display:flex;gap:8px;flex-wrap:wrap}
/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;transition:opacity .35s;pointer-events:none}
.ps{margin-bottom:18px}
</style>
</head>
<body>
<div id="root"><p style="padding:20px;color:#888;font-size:14px">Loading...</p></div>
<nav id="nav"></nav>
<script>
// ── WARM-UP ───────────────────────────────────────────────────────────────────
var WU=[
  {n:"Leg swings — forward/back",d:"10/leg",f:"Hip flexors, hamstrings"},
  {n:"Leg swings — lateral",d:"10/leg",f:"Adductors, glute med"},

// ── STORAGE ───────────────────────────────────────────────────────────────────
function lsG(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function uid(){return "u"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// ── PROFILE MANAGEMENT ────────────────────────────────────────────────────────
function getProfiles(){return lsG("gym_profiles")||{};}
function getActiveId(){return lsG("gym_active")||null;}
function setActiveId(id){lsS("gym_active",id);}

function createProfile(name){
  var profiles=getProfiles();
  var id=uid();
  profiles[id]={name:name,days:JSON.parse(JSON.stringify(DEFAULT_PLAN))};
  lsS("gym_profiles",profiles);
  return id;
}
function deleteProfile(id){
  var profiles=getProfiles();
  delete profiles[id];
  lsS("gym_profiles",profiles);
  ["wu","sw","cn","lg","hi","pr"].forEach(function(k){localStorage.removeItem("gym_"+k+"_"+id);});
}
function renameProfile(id,name){
  var profiles=getProfiles();
  if(profiles[id])profiles[id].name=name;
  lsS("gym_profiles",profiles);
}
function getProfileDays(id){
  var profiles=getProfiles();
  return profiles[id]?profiles[id].days:JSON.parse(JSON.stringify(DEFAULT_PLAN));
}
function saveProfileDays(id,days){
  var profiles=getProfiles();
  if(profiles[id]){profiles[id].days=days;lsS("gym_profiles",profiles);}
}

// Per-profile storage keys
function pk(s){return "gym_"+s+"_"+(getActiveId()||"default");}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function pad2(n){return String(n).padStart(2,"0");}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function fmtDate(s){try{var d=new Date(s+"T12:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return s;}}
function fmtDateS(s){try{var d=new Date(s+"T12:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch(e){return s;}}
function demoUrl(n){return"https://www.youtube.com/results?search_query="+encodeURIComponent(n+" exercise form tutorial");}
function fmtRest(s){if(s>=60){var m=Math.floor(s/60),r=s%60;return r>0?m+"m "+r+"s":m+"m";}return s+"s";}
function maxW(sets){var m=0;(sets||[]).forEach(function(s){if(s.done&&s.w){var w=parseFloat(s.w);if(!isNaN(w)&&w>m)m=w;}});return m;}

function flatAlts(ex){
  var result=[{name:ex.n,cat:"original"}];
  if(!ex.alts)return result;
  if(Array.isArray(ex.alts)){ex.alts.forEach(function(a){result.push({name:a,cat:"Alt"});});}
  else{Object.keys(ex.alts).forEach(function(cat){ex.alts[cat].forEach(function(a){result.push({name:a,cat:cat});});});}
  return result;
}

// ── LOG HELPERS ───────────────────────────────────────────────────────────────
function getDays(){return getProfileDays(getActiveId());}
function saveDays(days){saveProfileDays(getActiveId(),days);}
function getActiveDay(){var days=getDays();return days.find(function(d){return d.id===S.activeDay;})||days[0];}

function getLog(dayId){
  var days=getDays();var day=days.find(function(d){return d.id===dayId;});
  if(!S.logs[dayId]){
    var log={};
    if(day)day.ex.forEach(function(ex){log[ex.id]=Array.from({length:ex.sets},function(){return{w:"",done:false};});});
    S.logs[dayId]=log;lsS(pk("lg"),S.logs);
  }
  return S.logs[dayId];
}

function swapIdx(dId,xi){return S.swaps[dId+"_"+xi]||0;}
function exNameFromIdx(ex,dId,xi){
  var sk=dId+"_"+xi;
  var idx=swapIdx(dId,xi);
  if(idx===-1)return S.customNames[sk]||ex.n;
  var flat=flatAlts(ex);
  return idx<flat.length?flat[idx].name:ex.n;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function getHist(){return lsG(pk("hi"))||{};}
function saveSnap(dayId){
  var t=todayStr();var hist=getHist();var days=getDays();
  var day=days.find(function(d){return d.id===dayId;});
  var log=S.logs[dayId];if(!day||!log)return;
  if(!hist[t])hist[t]={};
  var exData={};
  day.ex.forEach(function(ex,xi){
    exData[ex.id]={name:exNameFromIdx(ex,dayId,xi),sets:(log[ex.id]||[]).map(function(s){return{w:s.w,done:s.done};})};
  });
  hist[t][dayId]={dn:day.t,col:day.color,ex:exData};
  lsS(pk("hi"),hist);
}
function lastWeight(exId){
  var hist=getHist();var dates=Object.keys(hist).sort().reverse();
  for(var i=0;i<dates.length;i++){
    var dm=hist[dates[i]];
    for(var j=0;j<Object.keys(dm).length;j++){
      var ent=dm[Object.keys(dm)[j]];
      if(ent.ex&&ent.ex[exId]){var m=maxW(ent.ex[exId].sets);if(m>0)return{w:m,date:dates[i]};}
    }
  }
  return null;
}
function getPRs(){return lsG(pk("pr"))||{};}
function checkPR(exId,nm,weight){
  var w=parseFloat(weight);if(!w||isNaN(w))return false;
  var prs=getPRs();
  if(!prs[exId]||w>prs[exId].w){prs[exId]={w:w,date:todayStr(),name:nm};lsS(pk("pr"),prs);return true;}
  return false;
}
function lastSession(dayId,excl){
  var hist=getHist();var dates=Object.keys(hist).sort().reverse();
  for(var i=0;i<dates.length;i++){
    if(excl&&dates[i]===excl)continue;
    if(hist[dates[i]]&&hist[dates[i]][dayId])return{date:dates[i],data:hist[dates[i]][dayId]};
  }
  return null;
}
function exHistory(exId){
  var hist=getHist();var dates=Object.keys(hist).sort();var res=[];
  dates.forEach(function(d){
    Object.values(hist[d]).forEach(function(ent){
      if(ent.ex&&ent.ex[exId]){var m=maxW(ent.ex[exId].sets);if(m>0)res.push({date:d,mw:m});}
    });
  });
  return res.slice(-10);
}

// ── TIMERS ────────────────────────────────────────────────────────────────────
function startTimer(id,secs){
  var t=S.timers[id];if(t&&t.iv)clearInterval(t.iv);
  S.timers[id]={rem:secs,st:"run",iv:null};
  S.timers[id].iv=setInterval(function(){
    if(!S.timers[id])return;
    S.timers[id].rem--;
    if(S.timers[id].rem<=0){clearInterval(S.timers[id].iv);S.timers[id].st="done";if(navigator.vibrate)navigator.vibrate([80,40,80]);}
    refreshTimerBtn(id);
  },1000);
  refreshTimerBtn(id);
}
function stopTimer(id){
  if(S.timers[id]&&S.timers[id].iv)clearInterval(S.timers[id].iv);
  S.timers[id]={rem:0,st:"idle"};refreshTimerBtn(id);
}
function refreshTimerBtn(id){
  var btn=document.getElementById("tb_"+id),hint=document.getElementById("th_"+id);if(!btn)return;
  var t=S.timers[id];
  if(!t||t.st==="idle"){btn.className="t-btn";btn.textContent="Rest";if(hint)hint.style.display="";}
  else if(t.st==="run"){btn.className="t-btn run";btn.textContent=t.rem+"s";if(hint)hint.style.display="none";}
  else{btn.className="t-btn fin";btn.textContent="Go!";if(hint)hint.style.display="none";
    setTimeout(function(){if(S.timers[id]&&S.timers[id].st==="done"){S.timers[id]={rem:0,st:"idle"};refreshTimerBtn(id);}},3000);}
}

// ── TOAST + SPARKLINE ─────────────────────────────────────────────────────────
function showToast(msg){
  var old=document.getElementById("_toast");if(old&&old.parentNode)old.parentNode.removeChild(old);
  var el=document.createElement("div");el.className="toast";el.id="_toast";el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.style.opacity="0";setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},400);},2800);
}
function sparkSVG(pts){
  if(!pts||pts.length<2)return"";
  var W=260,H=56,pd=4;
  var vals=pts.map(function(p){return p.mw;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var n=pts.length,bw=Math.max(4,Math.floor((W-pd*2)/n)-3);
  var bars="",lbls="";
  for(var i=0;i<n;i++){
    var x=pd+i*((W-pd*2)/n);
    var bh=Math.max(4,Math.round(((vals[i]-mn)/rng)*(H-20)));
    var y=H-12-bh;var last=(i===n-1);
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+(last?"#e08010":"#d0d0c8")+'"/>';
    if(i===0||last||i===Math.floor(n/2)){
      lbls+='<text x="'+(x+bw/2)+'" y="'+H+'" text-anchor="middle" font-size="9" fill="#ccc">'+fmtDateS(pts[i].date)+'</text>';
      lbls+='<text x="'+(x+bw/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="9" fill="'+(last?"#b06010":"#aaa")+'">'+vals[i]+'</text>';
    }
  }
  return'<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+bars+lbls+'</svg>';
}

// ── MUSCLE LOOKUP (local, no API) ─────────────────────────────────────────────
function getMuscles(name){
  if(!name)return"";
  // Check preset id-keyed table first
  if(MUSCLES[name])return MUSCLES[name];
  // Check name-keyed table (covers all swap list exercises)
  var key=name.trim().toLowerCase();
  return MUSCLE_NAMES[key]||"";
}
function useAIAlt(sk,exId,name){
  var parts=sk.split("_"),dId=parts[0];
  S.swaps[sk]=-1;S.customNames[sk]=name;
  lsS(pk("sw"),S.swaps);lsS(pk("cn"),S.customNames);
  var log=getLog(dId);var days=getDays();var day=days.find(function(d){return d.id===dId;});
  if(day){var ex=day.ex.find(function(e){return e.id===exId;});
    if(ex)log[exId]=Array.from({length:ex.sets},function(){return{w:"",done:false};});}
  lsS(pk("lg"),S.logs);S.swapOpen=null;render();
}

// ── SWAP PANEL ────────────────────────────────────────────────────────────────
function renderSwapPanel(ex,xi,dayId){
  var sk=dayId+"_"+xi;
  var curIdx=swapIdx(dayId,xi);
  var flat=flatAlts(ex);
  var activeCat=S.swapFilter[sk]||null;
  var cats=["All"];
  if(!Array.isArray(ex.alts)&&ex.alts){Object.keys(ex.alts).forEach(function(c){cats.push(c);});}

  var filterRow="";
  if(cats.length>2){
    filterRow='<div class="swap-filter-row">';
    cats.forEach(function(c){
      var isActive=(activeCat===null&&c==="All")||(activeCat===c);
      filterRow+='<button class="swap-filter'+(isActive?" active":"")+'" onclick="setSwapFilter(\''+sk+'\',\''+(c==="All"?"null":c)+'\')">'+c+'</button>';
    });
    filterRow+='</div>';
  }

  var opts="";var lastCat=null;
  flat.forEach(function(item,idx){
    var cat=item.cat==="original"?"original":item.cat;
    if(activeCat&&cat!=="original"&&cat!==activeCat)return;
    if(cat!=="original"&&cat!==lastCat&&cats.length>2){
      opts+='<div class="swap-cat-label">'+cat+'</div>';lastCat=cat;
    }
    var chosen=(idx===curIdx);
    opts+='<button class="swap-opt'+(chosen?" chosen":"")+'" onclick="pickSwap(\''+sk+'\',\''+ex.id+'\','+idx+')">'+
      '<div class="swap-dot"></div>'+item.name+(cat==="original"?'<span class="orig-tag">(current)</span>':"")+
      '</button>';
  });

  var customVal=(curIdx===-1&&S.customNames[sk])?S.customNames[sk]:"";
  var customChosen=(curIdx===-1);

  // If custom exercise has a known muscle match, show it as a hint
  var customMuscleHint="";
  if(customChosen&&customVal){
    var cm=getMuscles(customVal);
    if(cm)customMuscleHint='<div style="font-size:11px;color:var(--gtx);background:var(--gbg);border:1px solid var(--gbd);border-radius:6px;padding:5px 9px;margin-top:6px">&#128170; '+cm+'</div>';
  }

  return'<div class="swap-panel">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
      '<span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Swap exercise</span>'+
      '<button onclick="toggleSwap(\''+sk+'\')" style="background:var(--border);border:none;border-radius:99px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:600">&#10005; Close</button>'+
    '</div>'+
    (cats.length>2?filterRow:"")+opts+
    '<div class="swap-divider"></div>'+
    '<div style="font-size:11px;color:var(--faint);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Or type any exercise</div>'+
    '<div class="custom-ex-row">'+
      '<input class="custom-ex-inp'+(customChosen?" chosen":"")+'" id="cex_'+sk+'" type="text" placeholder="e.g. Landmine Press..." value="'+customVal+'">'+
      '<button class="custom-ex-use" onclick="useCustomEx(\''+sk+'\',\''+ex.id+'\')">Use</button>'+
    '</div>'+
    customMuscleHint+
    '</div>';
}

function renderCalendar(){
  var y=S.calY,m=S.calM;
  var mname=new Date(y,m,1).toLocaleString("en-US",{month:"long"});
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var hist=getHist(),td=todayStr();
  var h='<div class="cal-nav"><button class="cal-nav-btn" onclick="navMonth(-1)">&#8249;</button><span class="cal-month">'+mname+" "+y+'</span><button class="cal-nav-btn" onclick="navMonth(1)">&#8250;</button></div>'+
    '<div class="cal-dows"><div class="cal-dow">Su</div><div class="cal-dow">Mo</div><div class="cal-dow">Tu</div><div class="cal-dow">We</div><div class="cal-dow">Th</div><div class="cal-dow">Fr</div><div class="cal-dow">Sa</div></div><div class="cal-grid">';
  for(var i=0;i<fd;i++)h+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var ds=y+"-"+pad2(m+1)+"-"+pad2(d);var dm=hist[ds];var hd=dm&&Object.keys(dm).length>0;
    var cls="cal-cell"+(ds===td?" today":"")+(S.calSel===ds?" selected":"")+(hd?" has-data":"");
    var dots="";
    if(hd)Object.keys(dm).forEach(function(did){
      var days=getDays();var pl=days.find(function(p){return p.id===did;});
      dots+='<div class="cal-dot" style="background:'+(pl?pl.color:"#aaa")+'"></div>';
    });
    h+='<div class="'+cls+'" onclick="selectDate(\''+ds+'\')"><span class="cal-day-num">'+d+'</span>'+(dots?'<div class="cal-dots">'+dots+'</div>':"")+'</div>';
  }
  return h+"</div>";
}
function renderSelectedDay(){
  if(!S.calSel)return'<div class="no-data">Tap a date to see your workout</div>';
  var hist=getHist();var dm=hist[S.calSel];
  if(!dm||!Object.keys(dm).length)return'<div class="no-data">No workout logged on '+fmtDate(S.calSel)+'</div>';
  var h="";
  Object.keys(dm).forEach(function(did){
    var ent=dm[did];var prev=lastSession(did,S.calSel);
    h+='<div class="sel-card"><div class="sel-title">'+ent.dn+' &mdash; '+fmtDate(S.calSel)+'</div><div class="sel-sub">'+(prev?"vs. "+fmtDateS(prev.date)+" (prev session)":"First session logged")+'</div>';
    Object.keys(ent.ex).forEach(function(exId){
      var ex=ent.ex[exId];var dns=ex.sets.filter(function(s){return s.done&&s.w;});if(!dns.length)return;
      h+='<div class="sel-ex"><div class="sel-ex-name">'+ex.name+'</div><div class="sel-sets">';
      ex.sets.forEach(function(s,si){if(s.done&&s.w)h+='<span class="sel-chip">'+(si+1)+": "+s.w+"lbs</span>";});
      h+='</div>';
      var cm=maxW(ex.sets);
      if(prev&&prev.data.ex&&prev.data.ex[exId]){
        var pm=maxW(prev.data.ex[exId].sets);
        if(pm>0&&cm>0){var diff=Math.round((cm-pm)*10)/10;
          if(diff>0)h+='<div class="sel-vs up">&#9650; +'+diff+' lbs vs last session</div>';
          else if(diff<0)h+='<div class="sel-vs dn">&#9660; '+diff+' lbs vs last session</div>';
          else h+='<div class="sel-vs">= Same as last session</div>';
        }
      }
      var sp=exHistory(exId);if(sp.length>=2)h+='<div style="margin-top:8px">'+sparkSVG(sp)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}
function renderPRs(){
  var prs=getPRs();var keys=Object.keys(prs);
  if(!keys.length)return'<div class="no-pr">No PRs yet &mdash; start logging weights!</div>';
  keys.sort(function(a,b){return prs[a].name.localeCompare(prs[b].name);});

  return h+"</tbody></table>";
}

function pickSwap(sk,exId,idx){
  var parts=sk.split("_"),dId=parts[0];
  S.swaps[sk]=idx;lsS(pk("sw"),S.swaps);
  var log=getLog(dId);var days=getDays();var day=days.find(function(d){return d.id===dId;});
  if(day){var ex=day.ex.find(function(e){return e.id===exId;});
    if(ex)log[exId]=Array.from({length:ex.sets},function(){return{w:"",done:false};});}
  lsS(pk("lg"),S.logs);S.swapOpen=null;render();
}
function useCustomEx(sk,exId){
  var inp=document.getElementById("cex_"+sk);
  if(!inp||!inp.value.trim())return;
  var val=inp.value.trim();
  var parts=sk.split("_"),dId=parts[0];
  S.swaps[sk]=-1;S.customNames[sk]=val;
  lsS(pk("sw"),S.swaps);lsS(pk("cn"),S.customNames);
  var log=getLog(dId);var days=getDays();var day=days.find(function(d){return d.id===dId;});
  if(day){var ex=day.ex.find(function(e){return e.id===exId;});
    if(ex)log[exId]=Array.from({length:ex.sets},function(){return{w:"",done:false};});}
  lsS(pk("lg"),S.logs);S.swapOpen=null;render();
}

function updateWeight(dId,exId,si,val){
  var log=getLog(dId);if(log[exId]&&log[exId][si])log[exId][si].w=val;lsS(pk("lg"),S.logs);
}
function toggleSet(dId,exId,si,checked){
  var log=getLog(dId);if(!log[exId]||!log[exId][si])return;
  log[exId][si].done=checked;lsS(pk("lg"),S.logs);
  if(checked&&log[exId][si].w){
    var days=getDays();var day=days.find(function(d){return d.id===dId;});
    if(day){var xi=day.ex.findIndex(function(e){return e.id===exId;});
      var nm=exNameFromIdx(day.ex[xi],dId,xi);
      if(checkPR(exId,nm,log[exId][si].w))showToast("&#127942; New PR: "+log[exId][si].w+"lbs on "+nm+"!");}
  }
  saveSnap(dId);render();
}
function handleTimer(id,secs){var t=S.timers[id];if(t&&t.st==="run")stopTimer(id);else startTimer(id,secs);}
function resetDay(dId){delete S.logs[dId];lsS(pk("lg"),S.logs);render();}
function saveSetsReps(dId,exId){
  var srKey=dId+"_"+exId;
  var setsEl=document.getElementById("sri_sets_"+srKey);
  var repsEl=document.getElementById("sri_reps_"+srKey);
  if(!setsEl||!repsEl)return;
  var newSets=Math.max(1,Math.min(20,parseInt(setsEl.value)||3));
  var newReps=repsEl.value.trim()||"8-12";
  var days=getDays();
  var day=days.find(function(d){return d.id===dId;});
  if(!day)return;
  var ex=day.ex.find(function(e){return e.id===exId;});
  if(!ex)return;
  var oldSets=ex.sets;
  ex.sets=newSets;
  ex.r=newReps;
  saveDays(days);
  // Resize log to match new set count — preserve existing entries
  var log=getLog(dId);
  var cur=log[exId]||[];
  if(newSets>oldSets){
    for(var i=oldSets;i<newSets;i++)cur.push({w:"",done:false});
  } else {
    cur=cur.slice(0,newSets);
  }
  log[exId]=cur;
  lsS(pk("lg"),S.logs);
  S.setsRepsEdit=null;
  render();
}

// Edit mode handlers
function renameDayTitle(dId,val){
  var days=getDays();var day=days.find(function(d){return d.id===dId;});
  if(day){day.t=val;saveDays(days);}
}
function openNewDay(){S.newDayOpen=true;render();}
function saveNewDay(){
  var nameEl=document.getElementById("nd_name");var descEl=document.getElementById("nd_desc");
  if(!nameEl||!nameEl.value.trim()){showToast("Enter a day name");return;}
  var days=getDays();
  var newDay={id:uid(),t:nameEl.value.trim(),s:(descEl?descEl.value.trim():""),color:S.newDayColor,ex:[]};
  days.push(newDay);saveDays(days);
  S.activeDay=newDay.id;S.newDayOpen=false;S.editMode=true;
  render();
}
function delDay(dId,evt){
  if(evt)evt.stopPropagation();
  var days=getDays();
  if(days.length<=1){showToast("Can't delete the only day");return;}
  if(!confirm("Delete this day?"))return;
  var remaining=days.filter(function(d){return d.id!==dId;});
  saveDays(remaining);
  if(S.activeDay===dId)S.activeDay=remaining[0].id;
  S.editMode=false;render();
}
function saveNewExercise(dayId){
  var nameEl=document.getElementById("ae_name");var setsEl=document.getElementById("ae_sets");
  var repsEl=document.getElementById("ae_reps");var restEl=document.getElementById("ae_rest");
  if(!nameEl||!nameEl.value.trim()){showToast("Enter an exercise name");return;}
  var days=getDays();var day=days.find(function(d){return d.id===dayId;});
  if(!day)return;
  var newEx={id:uid(),n:nameEl.value.trim(),sets:parseInt(setsEl.value)||3,r:repsEl.value.trim()||"8-12",rest:parseInt(restEl.value)||90,alts:{}};
  day.ex.push(newEx);saveDays(days);
  var log=getLog(dayId);log[newEx.id]=Array.from({length:newEx.sets},function(){return{w:"",done:false};});
  lsS(pk("lg"),S.logs);S.addExOpen=false;render();
}
function delExercise(dId,exId){
  var days=getDays();var day=days.find(function(d){return d.id===dId;});
  if(!day)return;
  if(!confirm("Remove this exercise?"))return;
  day.ex=day.ex.filter(function(e){return e.id!==exId;});
  saveDays(days);render();
}

function doDeleteProfile(id){
  if(!confirm("Delete this profile and all its data?"))return;
  deleteProfile(id);
  var profiles=getProfiles();var ids=Object.keys(profiles);
  if(ids.length===0){var newId=createProfile("Me");setActiveId(newId);}
  else if(getActiveId()===id)setActiveId(ids[0]);
  loadProfileState();render();
}
function exportData(){
  var id=getActiveId();var profiles=getProfiles();
  var data={profile:profiles[id],logs:lsG(pk("lg")),hist:lsG(pk("hi")),prs:lsG(pk("pr")),swaps:lsG(pk("sw")),customNames:lsG(pk("cn")),exportDate:todayStr()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="gym-backup-"+todayStr()+".json";a.click();
  showToast("Backup exported!");
}
function importData(inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.profile)throw new Error("Invalid backup file");
      var id=getActiveId();var profiles=getProfiles();
      if(data.profile.days)profiles[id].days=data.profile.days;
      lsS("gym_profiles",profiles);
      if(data.logs)lsS(pk("lg"),data.logs);
      if(data.hist)lsS(pk("hi"),data.hist);
      if(data.prs)lsS(pk("pr"),data.prs);
      if(data.swaps)lsS(pk("sw"),data.swaps);
      if(data.customNames)lsS(pk("cn"),data.customNames);
      loadProfileState();render();showToast("Backup restored!");
    }catch(err){showToast("Invalid backup file");}
  };
  reader.readAsText(file);inp.value="";
}
function navMonth(delta){S.calM+=delta;if(S.calM>11){S.calM=0;S.calY++;}if(S.calM<0){S.calM=11;S.calY--;}render();}
function selectDate(ds){S.calSel=S.calSel===ds?null:ds;render();}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(function(){
  var profiles=getProfiles();
  var ids=Object.keys(profiles);
  if(ids.length===0){
    var id=createProfile("Me");
    setActiveId(id);
  } else if(!getActiveId()||!profiles[getActiveId()]){
    setActiveId(ids[0]);
  }
  loadProfileState();
  render();
})();
</script>
